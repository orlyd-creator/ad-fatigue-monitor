name: Meta auto-sync

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: meta-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pick mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "17 * * * *" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "label=full"  >> "$GITHUB_OUTPUT"
          else
            echo "mode=quick" >> "$GITHUB_OUTPUT"
            echo "label=quick" >> "$GITHUB_OUTPUT"
          fi

      - name: Hit /api/sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -euo pipefail
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_URL or CRON_SECRET secret"; exit 1
          fi
          echo "Triggering $MODE sync at $APP_URL"
          status=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/sync?mode=$MODE")
          echo "HTTP $status"
          cat response.json
          test "$status" = "200"
