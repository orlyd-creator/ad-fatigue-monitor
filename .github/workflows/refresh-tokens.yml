name: Refresh Meta tokens

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/refresh-tokens
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_URL or CRON_SECRET secret"; exit 1
          fi
          status=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/refresh-tokens")
          echo "HTTP $status"
          cat response.json
          test "$status" = "200"
